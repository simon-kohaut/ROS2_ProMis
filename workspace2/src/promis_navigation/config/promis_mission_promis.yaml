runtime:
  global_frame: map
  robot_frame: base_link
  update_rate_hz: 1.0
  min_recompute_translation_m: 0.5
  min_recompute_yaw_rad: 0.35
  stale_timeout_sec: 3.0

rolling_window:
  width_m: 20.0
  height_m: 20.0
  resolution_m: 0.2
  snap_to_grid: true

cost_conversion:
  max_occupancy: 100
  gamma: 1.0
  unknown_probability: 0.5
  lethal_probability_threshold: 0.05
  unknown_on_nan: false

engine:
  mode: promis
  promis:
    star_map_pickle: ""
    logic: ""
    batch_size: 10
    interpolation_method: linear
