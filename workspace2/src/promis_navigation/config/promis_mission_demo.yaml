runtime:
  global_frame: map
  robot_frame: base_link
  update_rate_hz: 1.0
  min_recompute_translation_m: 0.5
  min_recompute_yaw_rad: 0.35
  stale_timeout_sec: 3.0

rolling_window:
  width_m: 20.0
  height_m: 20.0
  resolution_m: 0.2
  snap_to_grid: true

cost_conversion:
  max_occupancy: 100
  gamma: 1.0
  unknown_probability: 0.5
  lethal_probability_threshold: 0.05
  unknown_on_nan: false

engine:
  mode: demo
  demo:
    preferred_corridor: top
    corridor_split_y: 0.0
    corridor_sigma_m: 2.0
    base_probability: 0.55
    preferred_bonus: 0.35
    opposite_penalty: 0.25
    wave_amplitude: 0.08
    wave_length_m: 8.0
    forbidden_zones:
      - center: [2.5, 2.0]
        radius_m: 1.4
        probability: 0.02
      - center: [-3.0, -1.0]
        radius_m: 1.2
        probability: 0.08
